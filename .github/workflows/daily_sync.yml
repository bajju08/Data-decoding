name: Market Decoder Daily Sync
on:
  schedule:
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Harvester
        run: python harvester.py

      - name: Commit and Push
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@market.com"
          git add market_data.csv || echo "File not found"
          git commit -m "Update Market Data [$(date)]" || echo "No changes to commit"
          git push
