name: NSE Daily Data Harvester

on:
  schedule:
    # Runs at 14:00 UTC (7:30 PM IST) Mon-Fri
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Harvester Script
        run: python harvester.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add market_data.csv
          git commit -m "Auto-update: Daily Smart Money Data [$(date)]" || echo "No changes to commit"
          git push
