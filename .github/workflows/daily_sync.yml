- name: Commit and Push
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@market.com"
          # This line forces GitHub to recognize the file even if it was just created
          git add market_data.csv || echo "File not found"
          git commit -m "Update Market Data [$(date)]" || echo "No changes to commit"
          git push
